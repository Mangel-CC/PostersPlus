## Placeholder Secret. In production, replace this with one of:
##   * external-secrets-operator (ExternalSecret pulling from Vault/SOPS/etc.)
##   * sealed-secrets (kubeseal-encrypted file checked in)
##   * Helm chart with --set-string and a values file outside the repo
##
## NEVER commit real key material. The empty stringData below documents the
## shape; replace with your real provisioning method.
apiVersion: v1
kind: Secret
metadata:
  name: postersplus-secrets
type: Opaque
stringData:
  ACCESS_KEY: ""             # strong random; mandate non-empty for hosted
  TMDB_API_KEY: ""           # operator key (optional if all tenants BYO)
  MDBLIST_API_KEY: ""        # operator key (optional)
  AIOSTREAMS_URL: ""         # optional
  AIOSTREAMS_AUTH: ""        # base64 user:password (optional)
  METRICS_ACCESS_KEY: ""     # optional /metrics shared secret
  AWS_ACCESS_KEY_ID: ""      # S3 credentials for OBJECT_STORE_URL
  AWS_SECRET_ACCESS_KEY: ""
