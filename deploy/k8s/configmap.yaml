apiVersion: v1
kind: ConfigMap
metadata:
  name: postersplus-config
data:
  # Non-secret env. Keys go in the Secret. Backend selection here picks
  # the hosted-mode shape (postgres + redis + s3). For private/sqlite
  # deployments, leave DATABASE_URL/REDIS_URL/OBJECT_STORE_URL blank.
  WORKERS: "2"

  # Phase 1
  DATABASE_URL: "postgresql://postersplus@postgres.postersplus.svc.cluster.local:5432/postersplus"
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "20"

  # Phase 2
  REDIS_URL: "redis://redis.postersplus.svc.cluster.local:6379/0"
  REDIS_KEY_PREFIX: "postersplus"

  # Phase 3 — replace with your bucket + endpoint + (optional) CDN URL
  OBJECT_STORE_URL: "s3://postersplus-cache?endpoint=https://s3.example.com&region=us-east-1"
  OBJECT_STORE_PUBLIC_URL: "https://cdn.example.com/postersplus"

  # Phase 4 — cap renders, return 503 after 30s queue wait
  RENDER_CONCURRENCY: "4"
  RENDER_QUEUE_TIMEOUT: "30"

  # Phase 6
  LOG_FORMAT: "json"
  COMPOSITE_MAX_ENTRIES: "20000"

  # Phase 8 — per-tenant /poster rate limit. Tune per workload.
  RATE_LIMIT_RPS: "20"

  # Upstream knobs (upstream defaults)
  QUALITY_OLD_CACHE_DURATION: "90"
  QUALITY_BG_CONCURRENCY: "5"
  CDN_CACHE_TTL: "86400"
  COMPOSITE_CACHE_TTL: "604800"
  DEFAULT_LOGO_LANGUAGE: "en"
