apiVersion: apps/v1
kind: Deployment
metadata:
  name: postersplus
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postersplus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postersplus
      annotations:
        # Prometheus scraping. Adjust port/path to your operator's conventions
        # (these annotations are picked up by prometheus-operator's
        # PodMonitor or the static-config + service discovery scraper).
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # uid 568 matches the appuser baked into the Dockerfile (matches
        # ElfHosted's per-app convention — see helmrelease-postersplus.yaml).
        runAsUser: 568
        runAsGroup: 568
        # fsGroup ensures emptyDir + persistent volume mounts are
        # group-writable by uid 568, so the read-only root filesystem
        # still has writable /app/cache + /tmp/postersplus-prom + /tmp.
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postersplus
          image: postersplus:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: postersplus-config
            - secretRef:
                name: postersplus-secrets
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /app/cache
            - name: prom-multiproc
              mountPath: /tmp/postersplus-prom
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
        - name: prom-multiproc
          emptyDir:
            sizeLimit: 32Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
